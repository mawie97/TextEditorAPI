services:
  db:
    image: postgres:16
    container_name: text_editor_db
    environment:
      POSTGRES_DB: texteditor
      POSTGRES_USER: texteditor
      POSTGRES_PASSWORD: texteditor
    ports:
      - "5432:5432"
    volumes:
      - text_editor_pgdata:/var/lib/postgresql/data


  api:
    build: .
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/texteditor
      DB_USER: texteditor
      DB_PASSWORD: texteditor
    ports:
      - "8080:8080"


volumes:
  text_editor_pgdata:
